name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      # Lint is advisory for now (repo has pre-existing lint debt); it reports
      # but does not fail the build, matching `next build`'s behaviour on Vercel.
      - run: npm run lint
        continue-on-error: true
      # Type-check without a full `next build` so CI does not depend on
      # runtime env vars / Supabase being reachable during static generation.
      - run: npx tsc --noEmit
