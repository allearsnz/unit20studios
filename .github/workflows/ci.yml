name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Type-check without a full `next build` so CI does not depend on
      # runtime env vars / Supabase being reachable during static generation.
      - run: npx tsc --noEmit
